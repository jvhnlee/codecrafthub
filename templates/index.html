<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeCraftHub - Learning Management Platform</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #1f2937;
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            margin-bottom: 30px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .header h1 {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(135deg, #8B5CF6, #3B82F6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
            letter-spacing: -0.02em;
        }

        .header p {
            font-size: 1.2rem;
            color: #6b7280;
            font-weight: 500;
        }

        .form-section {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .form-section h2 {
            font-size: 1.8rem;
            font-weight: 700;
            color: #1f2937;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-section h2::before {
            content: "➕";
            font-size: 1.5rem;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-weight: 600;
            color: #374151;
            margin-bottom: 8px;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            padding: 12px 16px;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.3s ease;
            background: #ffffff;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: #8B5CF6;
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.1);
            transform: translateY(-1px);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn-primary {
            background: linear-gradient(135deg, #8B5CF6, #3B82F6);
            color: white;
            box-shadow: 0 4px 15px rgba(139, 92, 246, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(139, 92, 246, 0.4);
        }

        .btn-success {
            background: linear-gradient(135deg, #F59E0B, #D97706);
            color: white;
            box-shadow: 0 4px 15px rgba(245, 158, 11, 0.3);
        }

        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(245, 158, 11, 0.4);
        }

        .btn-danger {
            background: linear-gradient(135deg, #EF4444, #DC2626);
            color: white;
            box-shadow: 0 4px 15px rgba(239, 68, 68, 0.3);
        }

        .btn-danger:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(239, 68, 68, 0.4);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #6b7280, #4b5563);
            color: white;
            box-shadow: 0 4px 15px rgba(107, 114, 128, 0.3);
        }

        .btn-secondary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(107, 114, 128, 0.4);
        }

        .courses-section {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .courses-section h2 {
            font-size: 1.8rem;
            font-weight: 700;
            color: #1f2937;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .courses-section h2::before {
            content: "📚";
            font-size: 1.5rem;
        }

        .courses-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }

        .course-card {
            background: linear-gradient(135deg, #ffffff, #f8fafc);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(139, 92, 246, 0.1);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .course-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(135deg, #8B5CF6, #3B82F6);
        }

        .course-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
        }

        .course-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
        }

        .course-title {
            font-size: 1.3rem;
            font-weight: 700;
            color: #1f2937;
            margin-bottom: 8px;
        }

        .course-status {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .status-not-started {
            background: #fee2e2;
            color: #dc2626;
        }

        .status-in-progress {
            background: #fef3c7;
            color: #d97706;
        }

        .status-completed {
            background: #d1fae5;
            color: #059669;
        }

        .course-description {
            color: #6b7280;
            margin-bottom: 16px;
            line-height: 1.6;
        }

        .course-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            font-size: 0.9rem;
            color: #6b7280;
        }

        .course-actions {
            display: flex;
            gap: 10px;
        }

        .course-actions .btn {
            padding: 8px 16px;
            font-size: 0.9rem;
        }

        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #e5e7eb;
            border-top: 4px solid #8B5CF6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .message {
            padding: 16px 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .message-success {
            background: #d1fae5;
            color: #059669;
            border: 1px solid #a7f3d0;
        }

        .message-error {
            background: #fee2e2;
            color: #dc2626;
            border: 1px solid #fecaca;
        }

        .message-success::before {
            content: "✅";
        }

        .message-error::before {
            content: "❌";
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #6b7280;
        }

        .empty-state h3 {
            font-size: 1.5rem;
            margin-bottom: 10px;
            color: #374151;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
            z-index: 1000;
            animation: fadeIn 0.3s ease;
        }

        .modal.show {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: white;
            border-radius: 20px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.25);
            animation: slideIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideIn {
            from { transform: translateY(-50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-header h3 {
            font-size: 1.5rem;
            font-weight: 700;
            color: #1f2937;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: #6b7280;
            padding: 5px;
            border-radius: 50%;
            transition: all 0.3s ease;
        }

        .close-btn:hover {
            background: #f3f4f6;
            color: #374151;
        }

        @media (max-width: 768px) {
            .container {
                padding: 15px;
            }

            .header h1 {
                font-size: 2rem;
            }

            .header p {
                font-size: 1rem;
            }

            .form-grid {
                grid-template-columns: 1fr;
            }

            .courses-grid {
                grid-template-columns: 1fr;
            }

            .course-actions {
                flex-direction: column;
            }

            .course-meta {
                flex-direction: column;
                gap: 5px;
                align-items: flex-start;
            }
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none !important;
        }

        .form-group.error input,
        .form-group.error textarea,
        .form-group.error select {
            border-color: #ef4444;
            box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.1);
        }

        .error-text {
            color: #ef4444;
            font-size: 0.8rem;
            margin-top: 5px;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>CodeCraftHub</h1>
            <p>Your Learning Management Platform</p>
        </div>

        <!-- Messages -->
        <div id="messages"></div>

        <!-- Add Course Form -->
        <div class="form-section">
            <h2>Add New Course</h2>
            <form id="courseForm">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="courseName">Course Name *</label>
                        <input type="text" id="courseName" name="name" required>
                        <div class="error-text" id="nameError"></div>
                    </div>
                    <div class="form-group">
                        <label for="targetDate">Target Date *</label>
                        <input type="date" id="targetDate" name="target_date" required>
                        <div class="error-text" id="targetDateError"></div>
                    </div>
                    <div class="form-group">
                        <label for="courseStatus">Status *</label>
                        <select id="courseStatus" name="status" required>
                            <option value="">Select Status</option>
                            <option value="Not Started">Not Started</option>
                            <option value="In Progress">In Progress</option>
                            <option value="Completed">Completed</option>
                        </select>
                        <div class="error-text" id="statusError"></div>
                    </div>
                </div>
                <div class="form-group">
                    <label for="courseDescription">Description *</label>
                    <textarea id="courseDescription" name="description" placeholder="Enter course description..." required></textarea>
                    <div class="error-text" id="descriptionError"></div>
                </div>
                <button type="submit" class="btn btn-primary" id="submitBtn">
                    <span id="submitText">Add Course</span>
                    <div id="submitSpinner" class="spinner" style="display: none; width: 20px; height: 20px; margin: 0 auto;"></div>
                </button>
            </form>
        </div>

        <!-- Courses List -->
        <div class="courses-section">
            <h2>Your Courses</h2>
            <div id="coursesContainer">
                <div class="loading">
                    <div class="spinner"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Edit Course Modal -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Edit Course</h3>
                <button class="close-btn" onclick="closeEditModal()">&times;</button>
            </div>
            <form id="editForm">
                <input type="hidden" id="editCourseId">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="editCourseName">Course Name *</label>
                        <input type="text" id="editCourseName" name="name" required>
                        <div class="error-text" id="editNameError"></div>
                    </div>
                    <div class="form-group">
                        <label for="editTargetDate">Target Date *</label>
                        <input type="date" id="editTargetDate" name="target_date" required>
                        <div class="error-text" id="editTargetDateError"></div>
                    </div>
                    <div class="form-group">
                        <label for="editCourseStatus">Status *</label>
                        <select id="editCourseStatus" name="status" required>
                            <option value="Not Started">Not Started</option>
                            <option value="In Progress">In Progress</option>
                            <option value="Completed">Completed</option>
                        </select>
                        <div class="error-text" id="editStatusError"></div>
                    </div>
                </div>
                <div class="form-group">
                    <label for="editCourseDescription">Description *</label>
                    <textarea id="editCourseDescription" name="description" required></textarea>
                    <div class="error-text" id="editDescriptionError"></div>
                </div>
                <div style="display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px;">
                    <button type="button" class="btn btn-secondary" onclick="closeEditModal()">Cancel</button>
                    <button type="submit" class="btn btn-success" id="updateBtn">
                        <span id="updateText">Update Course</span>
                        <div id="updateSpinner" class="spinner" style="display: none; width: 20px; height: 20px; margin: 0 auto;"></div>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const API_BASE_URL = '/api/courses';
        let courses = [];
        let editingCourseId = null;

        // Utility functions
        function showMessage(message, type = 'success') {
            const messagesContainer = document.getElementById('messages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message message-${type}`;
            messageDiv.textContent = message;
            
            messagesContainer.appendChild(messageDiv);
            
            setTimeout(() => {
                messageDiv.remove();
            }, 5000);
        }

        function clearErrors() {
            document.querySelectorAll('.error-text').forEach(el => el.textContent = '');
            document.querySelectorAll('.form-group').forEach(el => el.classList.remove('error'));
        }

        function showFieldError(fieldName, message, isEdit = false) {
            const prefix = isEdit ? 'edit' : '';
            const errorElement = document.getElementById(`${prefix}${fieldName}Error`);
            const formGroup = errorElement.closest('.form-group');
            
            if (errorElement) {
                errorElement.textContent = message;
                formGroup.classList.add('error');
            }
        }

        function validateForm(formData, isEdit = false) {
            clearErrors();
            let isValid = true;

            if (!formData.name || formData.name.trim().length < 2) {
                showFieldError('name', 'Course name must be at least 2 characters long', isEdit);
                isValid = false;
            }

            if (!formData.description || formData.description.trim().length < 10) {
                showFieldError('description', 'Description must be at least 10 characters long', isEdit);
                isValid = false;
            }

            if (!formData.target_date) {
                showFieldError('targetDate', 'Target date is required', isEdit);
                isValid = false;
            } else {
                const targetDate = new Date(formData.target_date);
                const today = new Date();
                today.setHours(0, 0, 0, 0);
                
                if (targetDate < today) {
                    showFieldError('targetDate', 'Target date cannot be in the past', isEdit);
                    isValid = false;
                }
            }

            if (!formData.status) {
                showFieldError('status', 'Status is required', isEdit);
                isValid = false;
            }

            return isValid;
        }

        function formatDate(dateString) {
            const options = { 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric' 
            };
            return new Date(dateString).toLocaleDateString('en-US', options);
        }

        function getStatusClass(status) {
            switch (status) {
                case 'Not Started':
                    return 'status-not-started';
                case 'In Progress':
                    return 'status-in-progress';
                case 'Completed':
                    return 'status-completed';
                default:
                    return 'status-not-started';
            }
        }

        // API functions
        async function fetchCourses() {
            try {
                const response = await fetch(API_BASE_URL);
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                const data = await response.json();
                courses = data;
                renderCourses();
            } catch (error) {
                console.error('Error fetching courses:', error);
                showMessage('Failed to load courses. Please check if the server is running.', 'error');
                renderEmptyState();
            }
        }

        async function createCourse(courseData) {
            try {
                const response = await fetch(API_BASE_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(courseData)
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.message || `HTTP error! status: ${response.status}`);
                }

                const newCourse = await response.json();
                courses.push(newCourse);
                renderCourses();
                showMessage('Course added successfully!');
                document.getElementById('courseForm').reset();
                return true;
            } catch (error) {
                console.error('Error creating course:', error);
                showMessage(error.message || 'Failed to add course. Please try again.', 'error');
                return false;
            }
        }

        async function updateCourse(id, courseData) {
            try {
                const response = await fetch(`${API_BASE_URL}/${id}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(courseData)
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.message || `HTTP error! status: ${response.status}`);
                }

                const updatedCourse = await response.json();
                const index = courses.findIndex(course => course.id === id);
                if (index !== -1) {
                    courses[index] = updatedCourse;
                }
                renderCourses();
                showMessage('Course updated successfully!');
                closeEditModal();
                return true;
            } catch (error) {
                console.error('Error updating course:', error);
                showMessage(error.message || 'Failed to update course. Please try again.', 'error');
                return false;
            }
        }

        async function deleteCourse(id) {
            if (!confirm('Are you sure you want to delete this course? This action cannot be undone.')) {
                return;
            }

            try {
                const response = await fetch(`${API_BASE_URL}/${id}`, {
                    method: 'DELETE'
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.message || `HTTP error! status: ${response.status}`);
                }

                courses = courses.filter(course => course.id !== id);
                renderCourses();
                showMessage('Course deleted successfully!');
            } catch (error) {
                console.error('Error deleting course:', error);
                showMessage(error.message || 'Failed to delete course. Please try again.', 'error');
            }
        }

        // Rendering functions
        function renderCourses() {
            const container = document.getElementById('coursesContainer');
            
            if (courses.length === 0) {
                renderEmptyState();
                return;
            }

            const coursesHTML = courses.map(course => `
                <div class="course-card">
                    <div class="course-header">
                        <div>
                            <h3 class="course-title">${escapeHtml(course.name)}</h3>
                            <span class="course-status ${getStatusClass(course.status)}">${course.status}</span>
                        </div>
                    </div>
                    <p class="course-description">${escapeHtml(course.description)}</p>
                    <div class="course-meta">
                        <span><strong>Target Date:</strong> ${formatDate(course.target_date)}</span>
                        <span><strong>Created:</strong> ${formatDate(course.created_at)}</span>
                    </div>
                    <div class="course-actions">
                        <button class="btn btn-success" onclick="editCourse(${course.id})">Edit</button>
                        <button class="btn btn-danger" onclick="deleteCourse(${course.id})">Remove</button>
                    </div>
                </div>
            `).join('');

            container.innerHTML = `<div class="courses-grid">${coursesHTML}</div>`;
        }

        function renderEmptyState() {
            const container = document.getElementById('coursesContainer');
            container.innerHTML = `
                <div class="empty-state">
                    <h3>No courses yet</h3>
                    <p>Start your learning journey by adding your first course above!</p>
                </div>
            `;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Modal functions
        function editCourse(id) {
            const course = courses.find(c => c.id === id);
            if (!course) return;

            editingCourseId = id;
            
            document.getElementById('editCourseId').value = course.id;
            document.getElementById('editCourseName').value = course.name;
            document.getElementById('editCourseDescription').value = course.description;
            document.getElementById('editTargetDate').value = course.target_date;
            document.getElementById('editCourseStatus').value = course.status;
            
            document.getElementById('editModal').classList.add('show');
            clearErrors();
        }

        function closeEditModal() {
            document.getElementById('editModal').classList.remove('show');
            editingCourseId = null;
            document.getElementById('editForm').reset();
            clearErrors();
        }

        // Form submission handlers
        document.getElementById('courseForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const submitBtn = document.getElementById('submitBtn');
            const submitText = document.getElementById('submitText');
            const submitSpinner = document.getElementById('submitSpinner');
            
            // Disable button and show loading
            submitBtn.disabled = true;
            submitText.style.display = 'none';
            submitSpinner.style.display = 'block';
            
            const formData = new FormData(e.target);
            const courseData = {
                name: formData.get('name').trim(),
                description: formData.get('description').trim(),
                target_date: formData.get('target_date'),
                status: formData.get('status')
            };

            if (validateForm(courseData)) {
                await createCourse(courseData);
            }
            
            // Re-enable button and hide loading
            submitBtn.disabled = false;
            submitText.style.display = 'inline';
            submitSpinner.style.display = 'none';
        });

        document.getElementById('editForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const updateBtn = document.getElementById('updateBtn');
            const updateText = document.getElementById('updateText');
            const updateSpinner = document.getElementById('updateSpinner');
            
            // Disable button and show loading
            updateBtn.disabled = true;
            updateText.style.display = 'none';
            updateSpinner.style.display = 'block';
            
            const formData = new FormData(e.target);
            const courseData = {
                name: formData.get('name').trim(),
                description: formData.get('description').trim(),
                target_date: formData.get('target_date'),
                status: formData.get('status')
            };

            if (validateForm(courseData, true)) {
                await updateCourse(editingCourseId, courseData);
            }
            
            // Re-enable button and hide loading
            updateBtn.disabled = false;
            updateText.style.display = 'inline';
            updateSpinner.style.display = 'none';
        });

        // Close modal when clicking outside
        document.getElementById('editModal').addEventListener('click', (e) => {
            if (e.target === e.currentTarget) {
                closeEditModal();
            }
        });

        // Close modal with Escape key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && document.getElementById('editModal').classList.contains('show')) {
                closeEditModal();
            }
        });

        // Initialize the application
        document.addEventListener('DOMContentLoaded', () => {
            fetchCourses();
            
            // Set minimum date to today for date inputs
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('targetDate').setAttribute('min', today);
            document.getElementById('editTargetDate').setAttribute('min', today);
        });

        // Auto-clear messages after form submission
        document.getElementById('courseForm').addEventListener('input', () => {
            clearErrors();
        });

        document.getElementById('editForm').addEventListener('input', () => {
            clearErrors();
        });

        // Add smooth scrolling to courses section after adding a course
        function scrollToCoursesSection() {
            document.querySelector('.courses-section').scrollIntoView({
                behavior: 'smooth',
                block: 'start'
            });
        }

        // Enhanced error handling for network issues
        window.addEventListener('online', () => {
            showMessage('Connection restored. Refreshing courses...', 'success');
            fetchCourses();
        });

        window.addEventListener('offline', () => {
            showMessage('You are offline. Some features may not work.', 'error');
        });

        // Add keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            // Ctrl/Cmd + Enter to submit forms
            if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                const activeForm = document.querySelector('form:focus-within');
                if (activeForm) {
                    activeForm.dispatchEvent(new Event('submit', { cancelable: true }));
                }
            }
        });

        // Add form validation on blur
        function addBlurValidation() {
            const inputs = document.querySelectorAll('input[required], textarea[required], select[required]');
            inputs.forEach(input => {
                input.addEventListener('blur', () => {
                    const formData = {};
                    const form = input.closest('form');
                    const formDataObj = new FormData(form);
                    
                    for (let [key, value] of formDataObj.entries()) {
                        formData[key] = value;
                    }
                    
                    const isEdit = form.id === 'editForm';
                    
                    // Validate individual field
                    if (input.name === 'name' && (!formData.name || formData.name.trim().length < 2)) {
                        showFieldError('name', 'Course name must be at least 2 characters long', isEdit);
                    } else if (input.name === 'description' && (!formData.description || formData.description.trim().length < 10)) {
                        showFieldError('description', 'Description must be at least 10 characters long', isEdit);
                    } else if (input.name === 'target_date' && formData.target_date) {
                        const targetDate = new Date(formData.target_date);
                        const today = new Date();
                        today.setHours(0, 0, 0, 0);
                        
                        if (targetDate < today) {
                            showFieldError('targetDate', 'Target date cannot be in the past', isEdit);
                        }
                    } else if (input.name === 'status' && !formData.status) {
                        showFieldError('status', 'Status is required', isEdit);
                    }
                });
            });
        }

        // Initialize blur validation after DOM is loaded
        document.addEventListener('DOMContentLoaded', () => {
            addBlurValidation();
        });

        // Add auto-save for edit form (optional enhancement)
        let autoSaveTimeout;
        function setupAutoSave() {
            const editForm = document.getElementById('editForm');
            const inputs = editForm.querySelectorAll('input, textarea, select');
            
            inputs.forEach(input => {
                input.addEventListener('input', () => {
                    clearTimeout(autoSaveTimeout);
                    autoSaveTimeout = setTimeout(() => {
                        // Auto-save logic could be implemented here
                        console.log('Auto-save triggered');
                    }, 2000);
                });
            });
        }

        // Add search and filter functionality
        function addSearchAndFilter() {
            const coursesSection = document.querySelector('.courses-section h2');
            const searchHTML = `
                <div style="display: flex; gap: 15px; margin: 20px 0; flex-wrap: wrap;">
                    <input type="text" id="searchCourses" placeholder="Search courses..." 
                           style="flex: 1; min-width: 200px; padding: 10px; border: 2px solid #e5e7eb; border-radius: 8px;">
                    <select id="filterStatus" style="padding: 10px; border: 2px solid #e5e7eb; border-radius: 8px;">
                        <option value="">All Statuses</option>
                        <option value="Not Started">Not Started</option>
                        <option value="In Progress">In Progress</option>
                        <option value="Completed">Completed</option>
                    </select>
                </div>
            `;
            
            coursesSection.insertAdjacentHTML('afterend', searchHTML);
            
            // Add event listeners for search and filter
            document.getElementById('searchCourses').addEventListener('input', filterCourses);
            document.getElementById('filterStatus').addEventListener('change', filterCourses);
        }

        function filterCourses() {
            const searchTerm = document.getElementById('searchCourses')?.value.toLowerCase() || '';
            const statusFilter = document.getElementById('filterStatus')?.value || '';
            
            const filteredCourses = courses.filter(course => {
                const matchesSearch = course.name.toLowerCase().includes(searchTerm) || 
                                    course.description.toLowerCase().includes(searchTerm);
                const matchesStatus = !statusFilter || course.status === statusFilter;
                
                return matchesSearch && matchesStatus;
            });
            
            renderFilteredCourses(filteredCourses);
        }

        function renderFilteredCourses(filteredCourses) {
            const container = document.getElementById('coursesContainer');
            
            if (filteredCourses.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <h3>No courses found</h3>
                        <p>Try adjusting your search or filter criteria.</p>
                    </div>
                `;
                return;
            }

            const coursesHTML = filteredCourses.map(course => `
                <div class="course-card">
                    <div class="course-header">
                        <div>
                            <h3 class="course-title">${escapeHtml(course.name)}</h3>
                            <span class="course-status ${getStatusClass(course.status)}">${course.status}</span>
                        </div>
                    </div>
                    <p class="course-description">${escapeHtml(course.description)}</p>
                    <div class="course-meta">
                        <span><strong>Target Date:</strong> ${formatDate(course.target_date)}</span>
                        <span><strong>Created:</strong> ${formatDate(course.created_at)}</span>
                    </div>
                    <div class="course-actions">
                        <button class="btn btn-success" onclick="editCourse(${course.id})">Edit</button>
                        <button class="btn btn-danger" onclick="deleteCourse(${course.id})">Remove</button>
                    </div>
                </div>
            `).join('');

            container.innerHTML = `<div class="courses-grid">${coursesHTML}</div>`;
        }

        // Initialize search and filter after first render
        let searchInitialized = false;
        const originalRenderCourses = renderCourses;
        renderCourses = function() {
            originalRenderCourses();
            if (!searchInitialized && courses.length > 0) {
                addSearchAndFilter();
                searchInitialized = true;
            }
        };
    </script>
</body>
</html>
